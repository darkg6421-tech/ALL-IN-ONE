<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Official Links · Helper Guide</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* Same root variables and nav styles as above */
    :root { --primary: #0a4b5e; --accent: #2a8b7a; --bg-light: #f5fafc; --card-bg: #ffffff; --text-dark: #1a2e3b; --border-light: #dde9f0; }
    body.dark { --bg-light: #121f26; --card-bg: #1b2e38; --text-dark: #e2ecf2; --border-light: #2b4552; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--text-dark); padding:20px; }
    .container { max-width:1200px; margin:0 auto; background: var(--card-bg); border-radius:32px; padding:24px 32px; border:1px solid var(--border-light); }
    nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; padding-bottom:16px; border-bottom:2px solid var(--border-light); }
    .logo { font-size:1.9rem; font-weight:700; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .nav-links { display:flex; gap:8px; } .nav-links a { text-decoration:none; font-weight:550; color: var(--primary); padding:10px 18px; border-radius:40px; background:#ecf5f9; } body.dark .nav-links a { background:#1e4454; }
    .dropdown { position:relative; } .dropdown-content { display:none; position:absolute; background:var(--card-bg); border-radius:20px; } .dropdown:hover .dropdown-content { display:block; }
    .nav-controls { display:flex; gap:8px; } .lang-toggle, .dark-toggle { background:#e2ecf2; border:none; border-radius:40px; padding:8px 16px; }
    h2 { font-size:2rem; color:var(--primary); border-left:6px solid var(--accent); padding-left:20px; }
    .official-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:20px; margin:30px 0; }
    .link-card { background: var(--card-bg); border:1px solid var(--border-light); border-radius:20px; padding:22px; text-align:center; }
    .link-card a { color: var(--primary); text-decoration:none; font-weight:600; }
    .footer { margin-top:48px; padding-top:28px; border-top:2px solid var(--border-light); text-align:center; }
  </style>
</head>
<body>
<div class="container">
  <nav>
    <div class="logo"><i class="fas fa-compass"></i> Helper Guide</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <div class="dropdown">
        <a href="#" class="dropbtn">Services <i class="fas fa-chevron-down"></i></a>
        <div class="dropdown-content">
          <a href="aadhaar-guide.html">📇 Aadhaar</a><a href="pan-guide.html">🆔 PAN</a><a href="driving-licence.html">🚗 DL</a><a href="passport.html">🛂 Passport</a><a href="voter-id.html">🗳️ Voter ID</a>
        </div>
      </div>
      <a href="tools.html">Tools</a>
      <a href="official-links.html" class="active">Official Links</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
    <div class="nav-controls">
      <button class="lang-toggle" id="langToggle">हिंदी</button>
      <button class="dark-toggle" id="darkToggle"><i class="fas fa-moon"></i></button>
    </div>
  </nav>
  <h2 data-en="🔗 Official Government Websites" data-hi="🔗 आधिकारिक सरकारी वेबसाइट">🔗 Official Government Websites</h2>
  <div class="official-grid">
    <div class="link-card"><i class="fas fa-id-card fa-2x"></i><br><a href="https://uidai.gov.in/" target="_blank">UIDAI (Aadhaar)</a></div>
    <div class="link-card"><i class="fas fa-credit-card fa-2x"></i><br><a href="https://www.onlineservices.nsdl.com/" target="_blank">NSDL (PAN)</a></div>
    <div class="link-card"><i class="fas fa-car fa-2x"></i><br><a href="https://parivahan.gov.in/" target="_blank">Parivahan</a></div>
    <div class="link-card"><i class="fas fa-passport fa-2x"></i><br><a href="https://www.passportindia.gov.in/" target="_blank">Passport Seva</a></div>
  </div>
  <div class="footer">
    <p>© 2026 Helper Guide · Created & Maintained by <strong>Tanmay Foujdar</strong></p>
    <p><a href="privacy-policy.html">Privacy Policy</a> | <a href="terms.html">Terms</a> | <a href="contact.html">Contact</a></p>
  </div>
</div>
<script>
  // Same dark/lang toggle
  (function(){
    const body=document.body, dt=document.getElementById('darkToggle');
    if(localStorage.getItem('theme')==='dark'){ body.classList.add('dark'); dt.innerHTML='<i class="fas fa-sun"></i>'; }
    dt.addEventListener('click',()=>{ body.classList.toggle('dark'); let d=body.classList.contains('dark'); dt.innerHTML=d?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>'; localStorage.setItem('theme',d?'dark':'light'); });
    let lang='en'; const lt=document.getElementById('langToggle');
    function setLang(l){ document.querySelectorAll('[data-en][data-hi]').forEach(el=>el.textContent=el.getAttribute(`data-${l}`)); lt.textContent = l==='en'?'हिंदी':'English'; lang=l; localStorage.setItem('lang',l); }
    lt.addEventListener('click',()=>setLang(lang==='en'?'hi':'en')); setLang(localStorage.getItem('lang')||'en');
  })();
</script>
</body>
</html>
