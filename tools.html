<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Tools · Helper Guide</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root { --primary: #0a4b5e; --primary-light: #1a5f72; --accent: #2a8b7a; --bg-light: #f5fafc; --card-bg: #ffffff; --text-dark: #1a2e3b; --border-light: #dde9f0; }
    body.dark { --bg-light: #121f26; --card-bg: #1b2e38; --text-dark: #e2ecf2; --border-light: #2b4552; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-light); color: var(--text-dark); padding:20px; }
    .container { max-width:1200px; margin:0 auto; background: var(--card-bg); border-radius:32px; padding:24px 32px 32px; border:1px solid var(--border-light); }
    nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; padding-bottom:16px; border-bottom:2px solid var(--border-light); }
    .logo { font-size:1.9rem; font-weight:700; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .nav-links { display:flex; gap:8px; } .nav-links a { text-decoration:none; font-weight:550; color: var(--primary-light); padding:10px 18px; border-radius:40px; background:#ecf5f9; } body.dark .nav-links a { background:#1e4454; }
    .dropdown { position:relative; } .dropbtn { background:#ecf5f9; padding:10px 18px; border-radius:40px; } .dropdown-content { display:none; position:absolute; background:var(--card-bg); border-radius:20px; } .dropdown:hover .dropdown-content { display:block; }
    .nav-controls { display:flex; gap:8px; } .lang-toggle, .dark-toggle { background:#e2ecf2; border:none; border-radius:40px; padding:8px 16px; }
    h2 { font-size:2rem; color:var(--primary); border-left:6px solid var(--accent); padding-left:20px; }
    .tool-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px,1fr)); gap:24px; margin:30px 0; }
    .tool-card { background: var(--card-bg); border:1px solid var(--border-light); border-radius:24px; padding:24px; box-shadow:0 6px 14px rgba(0,0,0,0.02); }
    .tool-card h3 { margin-bottom:15px; color: var(--primary); }
    input, select, button { font-family:inherit; }
    .input-group { margin-bottom:16px; } .input-group label { display:block; margin-bottom:6px; font-weight:500; }
    .input-group input, .input-group select { width:100%; padding:12px 16px; border:1.5px solid var(--border-light); border-radius:40px; background:var(--bg-light); color:var(--text-dark); }
    .btn { background:var(--primary); color:white; border:none; padding:12px 24px; border-radius:60px; font-weight:600; cursor:pointer; }
    .result { margin-top:16px; padding:14px; background:#eef4f8; border-radius:20px; } body.dark .result { background:#1d3641; }
    .footer { margin-top:48px; padding-top:28px; border-top:2px solid var(--border-light); text-align:center; }
  </style>
</head>
<body>
<div class="container">
  <nav>
    <div class="logo"><i class="fas fa-compass"></i> Helper Guide</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <div class="dropdown">
        <a href="#" class="dropbtn">Services <i class="fas fa-chevron-down"></i></a>
        <div class="dropdown-content">
          <a href="aadhaar-guide.html">📇 Aadhaar</a><a href="pan-guide.html">🆔 PAN</a><a href="driving-licence.html">🚗 DL</a><a href="passport.html">🛂 Passport</a><a href="voter-id.html">🗳️ Voter ID</a>
        </div>
      </div>
      <a href="tools.html" class="active">Tools</a>
      <a href="official-links.html">Official Links</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
    <div class="nav-controls">
      <button class="lang-toggle" id="langToggle">हिंदी</button>
      <button class="dark-toggle" id="darkToggle"><i class="fas fa-moon"></i></button>
    </div>
  </nav>
  <h2 data-en="🛠️ Free Useful Tools" data-hi="🛠️ मुफ्त उपयोगी टूल्स">🛠️ Free Useful Tools</h2>
  <div class="tool-grid">
    <!-- Age Calculator -->
    <div class="tool-card">
      <h3><i class="fas fa-cake-candles"></i> Age Calculator</h3>
      <div class="input-group"><label>Birth Date</label><input type="date" id="dobInput"></div>
      <button class="btn" id="calcAge">Calculate</button>
      <div class="result" id="ageResult"></div>
    </div>
    <!-- EMI Calculator -->
    <div class="tool-card">
      <h3><i class="fas fa-calculator"></i> EMI Calculator</h3>
      <div class="input-group"><label>Loan Amount (₹)</label><input type="number" id="loanAmount" value="100000"></div>
      <div class="input-group"><label>Interest Rate (%)</label><input type="number" id="interestRate" value="10" step="0.1"></div>
      <div class="input-group"><label>Tenure (months)</label><input type="number" id="tenure" value="12"></div>
      <button class="btn" id="calcEMI">Calculate EMI</button>
      <div class="result" id="emiResult"></div>
    </div>
    <!-- Unit Converter -->
    <div class="tool-card">
      <h3><i class="fas fa-arrows-left-right"></i> Unit Converter</h3>
      <div class="input-group"><label>Value</label><input type="number" id="unitValue" value="1"></div>
      <div class="input-group"><label>From</label><select id="fromUnit"><option value="km">Kilometer</option><option value="mile">Mile</option></select></div>
      <div class="input-group"><label>To</label><select id="toUnit"><option value="mile">Mile</option><option value="km">Kilometer</option></select></div>
      <button class="btn" id="convertUnit">Convert</button>
      <div class="result" id="unitResult"></div>
    </div>
  </div>
  <div class="footer">
    <p>© 2026 Helper Guide · Created & Maintained by <strong>Tanmay Foujdar</strong></p>
    <p><a href="privacy-policy.html">Privacy Policy</a> | <a href="terms.html">Terms</a> | <a href="contact.html">Contact</a></p>
  </div>
</div>
<script>
  (function(){
    const body=document.body, dt=document.getElementById('darkToggle');
    if(localStorage.getItem('theme')==='dark'){ body.classList.add('dark'); dt.innerHTML='<i class="fas fa-sun"></i>'; }
    dt.addEventListener('click',()=>{ body.classList.toggle('dark'); let d=body.classList.contains('dark'); dt.innerHTML=d?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>'; localStorage.setItem('theme',d?'dark':'light'); });
    let lang='en'; const lt=document.getElementById('langToggle');
    function setLang(l){ document.querySelectorAll('[data-en][data-hi]').forEach(el=>el.textContent=el.getAttribute(`data-${l}`)); lt.textContent = l==='en'?'हिंदी':'English'; lang=l; localStorage.setItem('lang',l); }
    lt.addEventListener('click',()=>setLang(lang==='en'?'hi':'en')); setLang(localStorage.getItem('lang')||'en');
    // Age Calculator
    document.getElementById('calcAge').addEventListener('click', ()=>{
      const dob = new Date(document.getElementById('dobInput').value);
      const today = new Date();
      let age = today.getFullYear() - dob.getFullYear();
      const m = today.getMonth() - dob.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) age--;
      document.getElementById('ageResult').innerHTML = `Age: ${age} years`;
    });
    // EMI Calculator
    document.getElementById('calcEMI').addEventListener('click', ()=>{
      const P = parseFloat(document.getElementById('loanAmount').value);
      const r = parseFloat(document.getElementById('interestRate').value) / 1200;
      const n = parseFloat(document.getElementById('tenure').value);
      const emi = P * r * Math.pow(1+r, n) / (Math.pow(1+r, n) - 1);
      document.getElementById('emiResult').innerHTML = `Monthly EMI: ₹${emi.toFixed(2)}`;
    });
    // Unit Converter
    document.getElementById('convertUnit').addEventListener('click', ()=>{
      let val = parseFloat(document.getElementById('unitValue').value);
      const from = document.getElementById('fromUnit').value;
      const to = document.getElementById('toUnit').value;
      let result;
      if (from === 'km' && to === 'mile') result = val * 0.621371;
      else if (from === 'mile' && to === 'km') result = val / 0.621371;
      else result = val;
      document.getElementById('unitResult').innerHTML = `${val} ${from} = ${result.toFixed(4)} ${to}`;
    });
  })();
</script>
</body>
</html>
