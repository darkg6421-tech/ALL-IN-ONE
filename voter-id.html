<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root { --primary: #0a4b5e; --accent: #2a8b7a; --bg-light: #f5fafc; --card-bg: #ffffff; --text-dark: #1a2e3b; --border-light: #dde9f0; }
    body.dark { --bg-light: #121f26; --card-bg: #1b2e38; --text-dark: #e2ecf2; --border-light: #2b4552; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-light); color: var(--text-dark); padding:20px; }
    .container { max-width:1200px; margin:0 auto; background: var(--card-bg); border-radius:32px; padding:24px 32px 32px; border:1px solid var(--border-light); }
    nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; padding-bottom:16px; border-bottom:2px solid var(--border-light); }
    .logo { font-size:1.9rem; font-weight:700; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .nav-links { display:flex; gap:8px; } .nav-links a { text-decoration:none; font-weight:550; color: var(--primary); padding:10px 18px; border-radius:40px; background:#ecf5f9; }
    body.dark .nav-links a { background:#1e4454; }
    .dropdown { position:relative; } .dropdown-content { display:none; position:absolute; background:var(--card-bg); border-radius:20px; } .dropdown:hover .dropdown-content { display:block; }
    .nav-controls { display:flex; gap:8px; } .lang-toggle, .dark-toggle { background:#e2ecf2; border:none; border-radius:40px; padding:8px 16px; }
    .coming-soon { text-align:center; padding:60px 20px; }
    .footer { margin-top:48px; padding-top:28px; border-top:2px solid var(--border-light); text-align:center; }
  </style>
</head>
<body>
<div class="container">
  <nav>
    <div class="logo"><i class="fas fa-compass"></i> Helper Guide</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <div class="dropdown">
        <a href="#" class="dropbtn">Services <i class="fas fa-chevron-down"></i></a>
        <div class="dropdown-content">
          <a href="aadhaar-guide.html">📇 Aadhaar</a><a href="pan-guide.html">🆔 PAN</a><a href="driving-licence.html">🚗 DL</a><a href="passport.html">🛂 Passport</a><a href="voter-id.html">🗳️ Voter ID</a>
        </div>
      </div>
      <a href="tools.html">Tools</a><a href="official-links.html">Official Links</a><a href="about.html">About</a><a href="contact.html">Contact</a>
    </div>
    <div class="nav-controls">
      <button class="lang-toggle" id="langToggle">हिंदी</button>
      <button class="dark-toggle" id="darkToggle"><i class="fas fa-moon"></i></button>
    </div>
  </nav>
  <div class="coming-soon">
    <i class="fas fa-hourglass-half" style="font-size:5rem; color:#b1651a;"></i>
    <h2 data-en="Voter ID Guide – Coming Soon" data-hi="वोटर आईडी गाइड – जल्द आ रहा है">Voter ID Guide – Coming Soon</h2>
    <p data-en="We are preparing a detailed step-by-step guide. Stay tuned!" data-hi="हम विस्तृत गाइड तैयार कर रहे हैं। बने रहें!">We are preparing a detailed step-by-step guide. Stay tuned!</p>
  </div>
  <div class="footer">
    <p>© 2026 Helper Guide · Created & Maintained by <strong>Tanmay Foujdar</strong></p>

  </div>
</div>
<script>
  (function(){
    const body=document.body, dt=document.getElementById('darkToggle');
    if(localStorage.getItem('theme')==='dark'){ body.classList.add('dark'); dt.innerHTML='<i class="fas fa-sun"></i>'; }
    dt.addEventListener('click',()=>{ body.classList.toggle('dark'); let d=body.classList.contains('dark'); dt.innerHTML=d?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>'; localStorage.setItem('theme',d?'dark':'light'); });
    let lang='en'; const lt=document.getElementById('langToggle');
    function setLang(l){ document.querySelectorAll('[data-en][data-hi]').forEach(el=>el.textContent=el.getAttribute(`data-${l}`)); lt.textContent = l==='en'?'हिंदी':'English'; lang=l; localStorage.setItem('lang',l); }
    lt.addEventListener('click',()=>setLang(lang==='en'?'hi':'en')); setLang(localStorage.getItem('lang')||'en');
  })();
</script>
</body>
</html>
